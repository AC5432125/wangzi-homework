<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王子作业助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .nav { display: flex; background: #f8f9fa; border-bottom: 1px solid #e9ecef; overflow-x: auto; }
        .nav-btn { flex: 1; padding: 16px; border: none; background: transparent; cursor: pointer; font-size: 14px; color: #666; transition: all 0.3s; white-space: nowrap; }
        .nav-btn:hover, .nav-btn.active { background: white; color: #667eea; border-bottom: 2px solid #667eea; }
        .nav-btn .badge { background: #e74c3c; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 4px; }
        .content { padding: 24px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .api-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .api-box.hidden { display: none !important; }
        .api-box input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-top: 8px; }
        .api-box .btn-small { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-top: 8px; }
        .drop-zone { border: 2px dashed #ccc; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 20px; }
        .drop-zone:hover { border-color: #667eea; background: #f8f9ff; }
        .drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
        .preview { margin: 20px 0; text-align: center; }
        .preview img { max-width: 100%; max-height: 300px; border-radius: 8px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
        select, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
        .btn:disabled { opacity: 0.6; }
        .btn-secondary { background: #f8f9fa; color: #667eea; border: 1px solid #667eea; }
        .result { margin-top: 24px; padding: 20px; background: #f8f9fa; border-radius: 12px; }
        .score { font-size: 48px; font-weight: bold; color: #667eea; text-align: center; margin: 16px 0; }
        .record-item, .mistake-item { padding: 16px; background: #f8f9fa; border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
        .record-item:hover, .mistake-item:hover { background: #e9ecef; }
        .record-item { display: flex; justify-content: space-between; align-items: center; }
        .mistake-item { border-left: 4px solid #e74c3c; }
        .mistake-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .mistake-title { font-weight: 600; color: #333; }
        .mistake-meta { color: #999; font-size: 12px; }
        .mistake-content { color: #666; font-size: 14px; line-height: 1.6; margin-top: 8px; }
        .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .tag-math { background: #e3f2fd; color: #1976d2; }
        .tag-chinese { background: #f3e5f5; color: #7b1fa2; }
        .tag-english { background: #e8f5e9; color: #388e3c; }
        .empty { text-align: center; padding: 60px; color: #999; }
        .hidden { display: none !important; }
        .loading { text-align: center; padding: 40px; color: #667eea; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 16px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 24px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #e9ecef; }
        .modal-close { font-size: 24px; cursor: pointer; color: #999; }
        .modal-close:hover { color: #333; }
        .section { margin-bottom: 16px; }
        .section-title { font-weight: 600; color: #667eea; margin-bottom: 8px; }
        .section-content { background: #f8f9fa; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.6; }
        .error-answer { color: #e74c3c; }
        .correct-answer { color: #27ae60; }
        .question-text { font-weight: 500; margin-bottom: 8px; }
        .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px 24px; border-radius: 12px; flex: 1; min-width: 120px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.9; margin-top: 4px; }
        .filter-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 13px; }
        .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 王子作业助手</h1>
            <p>初一 · AI智能批改</p>
        </div>
        
        <div class="nav">
            <button class="nav-btn active" data-tab="upload">📤 上传作业</button>
            <button class="nav-btn" data-tab="records">📝 记录</button>
            <button class="nav-btn" data-tab="mistakes">❌ 错题 <span class="badge" id="mistakeCount" style="display:none">0</span></button>
        </div>
        
        <div class="content">
            <!-- API配置（已隐藏）-->
            <div id="apiBox" class="api-box hidden">
                <strong>🔑 配置 Kimi API Key</strong>
                <p style="font-size: 12px; color: #666; margin: 4px 0;">从 <a href="https://platform.moonshot.cn" target="_blank">platform.moonshot.cn</a> 获取</p>
                <input type="password" id="apiKeyInput" placeholder="sk-...">
                <button class="btn-small" onclick="saveApiKey()">保存</button>
            </div>

            <!-- 上传作业 -->
            <div id="upload" class="tab-panel active">
                <div class="drop-zone" id="dropZone">
                    <div class="icon">📷</div>
                    <p>点击上传作业照片</p>
                </div>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <div class="preview hidden" id="preview"></div>
                
                <div class="form-group">
                    <label>科目</label>
                    <select id="subject">
                        <option value="数学">数学</option>
                        <option value="语文">语文</option>
                        <option value="英语">英语</option>
                    </select>
                </div>
                
                <button class="btn" id="submitBtn" onclick="grade()">开始批改</button>
                <div id="result"></div>
            </div>
            
            <!-- 批改记录 -->
            <div id="records" class="tab-panel">
                <div id="recordsList"></div>
            </div>
            
            <!-- 错题本 -->
            <div id="mistakes" class="tab-panel">
                <div class="stats" id="mistakeStats"></div>
                <div class="filter-btns" id="mistakeFilters">
                    <button class="filter-btn active" onclick="filterMistakes('all')">全部</button>
                    <button class="filter-btn" onclick="filterMistakes('数学')">数学</button>
                    <button class="filter-btn" onclick="filterMistakes('语文')">语文</button>
                    <button class="filter-btn" onclick="filterMistakes('英语')">英语</button>
                </div>
                <div id="mistakesList"></div>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="modal" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modalTitle">详情</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // 初始化
        let apiKey = localStorage.getItem('kimi_api_key') || '';
        let currentImage = null;
        let currentMistakeFilter = 'all';
        
        document.addEventListener('DOMContentLoaded', function() {
            if (!apiKey) {
                alert('请先配置 Kimi API Key');
            }
            updateMistakeCount();
        });
        
        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (!key.startsWith('sk-')) { alert('请输入有效的 API Key'); return; }
            apiKey = key;
            localStorage.setItem('kimi_api_key', key);
            alert('API Key 已保存！');
        }

        // 标签切换
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'records') loadRecords();
                if (btn.dataset.tab === 'mistakes') loadMistakes();
            };
        });

        // 文件上传
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#667eea'; };
        dropZone.ondragleave = () => dropZone.style.borderColor = '#ccc';  
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImage = e.target.result;
                preview.innerHTML = `<img src="${currentImage}">`;
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // AI批改 - 使用结构化JSON输出
        async function grade() {
            if (!currentImage) { alert('请先上传照片'); return; }
            if (!apiKey) { alert('请先配置 API Key'); return; }
            
            const subject = document.getElementById('subject').value;
            const btn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = 'AI批改中...';
            resultDiv.innerHTML = '<div class="loading">AI分析中，请稍候...</div>';
            
            try {
                const imageBase64 = currentImage.split(',')[1];
                
                // 结构化JSON输出提示词
                const promptText = `你是一位资深的${subject}老师，请仔细批改这份学生作业。

请按以下JSON格式返回批改结果：
{
  "score": "得分数字",
  "totalScore": "总分数字", 
  "overallComment": "总体评价",
  "questions": [
    {
      "number": "1",
      "question": "题目内容描述",
      "studentAnswer": "学生写的答案，如果是空白写'未作答'",
      "correctAnswer": "正确答案",
      "isCorrect": true/false,
      "analysis": "解析说明"
    }
  ],
  "wrongQuestions": [
    {
      "number": "1", 
      "question": "题目内容",
      "studentAnswer": "学生的错误答案",
      "correctAnswer": "正确答案",
      "errorType": "错误类型如：概念错误/计算错误/粗心/未作答",
      "analysis": "详细解析"
    }
  ],
  "studyAdvice": "学习建议"
}

重要提示：
1. 必须严格按照JSON格式返回
2. number字段必须是题号数字（如"1", "2", "3"）
3. 仔细看图片中学生写的答案，填入studentAnswer
4. 如果学生没写或空白，studentAnswer填"未作答"
5. 如果是错题，同时加入wrongQuestions数组
6. 只返回JSON，不要其他文字`;

                const response = await fetch('https://api.moonshot.cn/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'moonshot-v1-8k-vision-preview',
                        messages: [{
                            role: 'user',
                            content: [
                                { type: 'text', text: promptText },
                                { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${imageBase64}` } }
                            ]
                        }],
                        max_tokens: 4096
                    })
                });
                
                if (!response.ok) {
                    const errText = await response.text();
                    let errMsg = 'API请求失败';
                    try {
                        const errJson = JSON.parse(errText);
                        errMsg = errJson.error?.message || errJson.message || errMsg;
                    } catch(e) {}
                    throw new Error(errMsg);
                }
                
                const data = await response.json();
                const aiContent = data.choices[0]?.message?.content || '{}';
                
                // 解析JSON响应
                let gradeResult;
                try {
                    // 提取JSON部分（AI有时会返回markdown代码块）
                    const jsonMatch = aiContent.match(/```json\s*([\s\S]*?)```/) || 
                                     aiContent.match(/```\s*([\s\S]*?)```/) ||
                                     [null, aiContent];
                    const jsonStr = jsonMatch[1].trim();
                    gradeResult = JSON.parse(jsonStr);
                } catch (e) {
                    // 如果JSON解析失败，使用原始文本
                    console.error('JSON parse error:', e);
                    gradeResult = {
                        score: '?',
                        totalScore: '100',
                        overallComment: aiContent,
                        questions: [],
                        wrongQuestions: [],
                        studyAdvice: ''
                    };
                }
                
                // 确保字段存在，处理undefined
                const safeQuestions = (gradeResult.questions || []).map((q, idx) => ({
                    number: q.number || (idx + 1).toString(),
                    question: q.question || '第' + (idx + 1) + '题',
                    studentAnswer: q.studentAnswer || '未作答',
                    correctAnswer: q.correctAnswer || '',
                    isCorrect: q.isCorrect === true,
                    analysis: q.analysis || '暂无解析'
                }));
                
                const safeWrongQuestions = (gradeResult.wrongQuestions || []).map((wq, idx) => ({
                    number: wq.number || (idx + 1).toString(),
                    question: wq.question || '题目内容',
                    studentAnswer: wq.studentAnswer || '未作答',
                    correctAnswer: wq.correctAnswer || '',
                    errorType: wq.errorType || '错误',
                    analysis: wq.analysis || '暂无解析'
                }));
                
                const record = {
                    id: Date.now(),
                    timestamp: new Date().toISOString(),
                    date: new Date().toLocaleDateString('zh-CN'),
                    time: new Date().toLocaleTimeString('zh-CN'),
                    subject: subject,
                    score: `${gradeResult.score || '?'}/${gradeResult.totalScore || '100'}`,
                    overallComment: gradeResult.overallComment || '',
                    questions: safeQuestions,
                    wrongQuestions: safeWrongQuestions,
                    studyAdvice: gradeResult.studyAdvice || '',
                    rawContent: aiContent,
                    image: currentImage // 保存作业图片
                };
                
                // 保存批改记录
                const records = JSON.parse(localStorage.getItem('records') || '[]');
                records.unshift(record);
                localStorage.setItem('records', JSON.stringify(records));
                
                // 保存错题到错题本
                if (record.wrongQuestions && record.wrongQuestions.length > 0) {
                    const mistakes = JSON.parse(localStorage.getItem('mistakes') || '[]');
                    record.wrongQuestions.forEach(wq => {
                        mistakes.push({
                            id: Date.now() + Math.random(),
                            recordId: record.id,
                            timestamp: record.timestamp,
                            date: record.date,
                            time: record.time,
                            subject: subject,
                            number: wq.number,
                            question: wq.question,
                            studentAnswer: wq.studentAnswer,
                            correctAnswer: wq.correctAnswer,
                            errorType: wq.errorType,
                            analysis: wq.analysis
                        });
                    });
                    localStorage.setItem('mistakes', JSON.stringify(mistakes));
                    updateMistakeCount();
                }
                
                // 显示结果
                displayResult(record);
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result" style="color: #dc3545;">
                        <h3>❌ 批改失败</h3>
                        <p>${error.message}</p>
                        <p style="font-size: 12px; margin-top: 8px;">常见原因：<br>1. API Key 错误或过期<br>2. 网络连接问题<br>3. 图片过大</p>
                    </div>
                `;
            }
            
            btn.disabled = false;
            btn.textContent = '开始批改';
        }

        function displayResult(record) {
            const resultDiv = document.getElementById('result');
            const hasMistakes = record.wrongQuestions && record.wrongQuestions.length > 0;
            const hasQuestions = record.questions && record.questions.length > 0;
            
            let html = `
                <div class="result">
                    <h3>🤖 AI 批改结果</h3>
                    <div class="score">${record.score}</div>
                    <p style="text-align: center; color: #666; margin-bottom: 16px;">${record.subject} · ${record.date}</p>
                    
                    <div class="section">
                        <div class="section-title">📋 总体评价</div>
                        <div class="section-content">${record.overallComment || '暂无评价'}</div>
                    </div>
            `;
            
            // 逐题批改详情
            if (hasQuestions) {
                html += `
                    <div class="section">
                        <div class="section-title">📝 逐题批改（共${record.questions.length}题）</div>
                        <div class="section-content">
                `;
                record.questions.forEach((q, idx) => {
                    const qNum = q.number || (idx + 1);
                    const qTitle = q.question || `第${qNum}题`;
                    const qAnswer = q.studentAnswer || '未作答';
                    const qCorrect = q.correctAnswer || '';
                    const qAnalysis = q.analysis || '暂无解析';
                    const statusIcon = q.isCorrect ? '✅' : '❌';
                    const statusColor = q.isCorrect ? '#27ae60' : '#e74c3c';
                    // 生成唯一ID用于添加错题
                    const questionId = `q_${record.id}_${idx}`;
                    html += `
                        <div id="${questionId}" style="margin-bottom: 16px; padding: 12px; background: ${q.isCorrect ? '#f0fff4' : '#fff3f3'}; border-radius: 8px; border-left: 4px solid ${statusColor};">
                            <div style="font-weight: 600; margin-bottom: 8px;">${statusIcon} 第${qNum}题</div>
                            <div style="margin-bottom: 6px;"><strong>题目：</strong>${qTitle}</div>
                            <div style="margin-bottom: 6px; color: #666;"><strong>你的答案：</strong>${qAnswer}</div>
                            ${!q.isCorrect && qCorrect ? `<div style="margin-bottom: 6px; color: #27ae60;"><strong>正确答案：</strong>${qCorrect}</div>` : ''}
                            <div style="color: #666; font-size: 13px; margin-bottom: 8px;"><strong>解析：</strong>${qAnalysis}</div>
                            ${!q.isCorrect ? `<button onclick="addToMistake(${record.id}, ${idx})" style="background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;">➕ 加入错题本</button>` : ''}
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            
            // 错题概览
            if (hasMistakes) {
                html += `
                    <div class="section">
                        <div class="section-title">❌ 错题概览（共${record.wrongQuestions.length}题）</div>
                        <div class="section-content">
                `;
                record.wrongQuestions.forEach((wq, idx) => {
                    const wqNum = wq.number || (idx + 1);
                    const wqType = wq.errorType || '错误';
                    html += `<div style="margin-bottom: 8px; padding: 8px; background: #fff3f3; border-radius: 4px;">
                        <strong>第${wqNum}题</strong> - ${wqType}
                    </div>`;
                });
                html += `</div></div>`;
            }
            
            if (record.studyAdvice) {
                html += `
                    <div class="section">
                        <div class="section-title">💡 学习建议</div>
                        <div class="section-content">${record.studyAdvice}</div>
                    </div>
                `;
            }
            
            html += '</div>';
            resultDiv.innerHTML = html;
        }

        // 手动添加错题到错题本
        function addToMistake(recordId, questionIndex) {
            const records = JSON.parse(localStorage.getItem('records') || '[]');
            const record = records.find(r => r.id === recordId);
            if (!record || !record.questions || !record.questions[questionIndex]) {
                alert('找不到该题目');
                return;
            }
            
            const q = record.questions[questionIndex];
            const mistakes = JSON.parse(localStorage.getItem('mistakes') || '[]');
            
            // 检查是否已存在
            const exists = mistakes.some(m => m.recordId === recordId && m.number === (q.number || (questionIndex + 1).toString()));
            if (exists) {
                alert('该题已在错题本中');
                return;
            }
            
            mistakes.push({
                id: Date.now(),
                recordId: recordId,
                timestamp: record.timestamp,
                date: record.date,
                time: record.time,
                subject: record.subject,
                number: q.number || (questionIndex + 1).toString(),
                question: q.question || `第${q.number || (questionIndex + 1)}题`,
                studentAnswer: q.studentAnswer || '未作答',
                correctAnswer: q.correctAnswer || '',
                errorType: q.analysis ? (q.analysis.includes('概念') ? '概念错误' : q.analysis.includes('计算') ? '计算错误' : '错误') : '错误',
                analysis: q.analysis || '暂无解析'
            });
            
            localStorage.setItem('mistakes', JSON.stringify(mistakes));
            updateMistakeCount();
            alert('已加入错题本！');
        }

        function loadRecords() {
            const records = JSON.parse(localStorage.getItem('records') || '[]');
            const list = document.getElementById('recordsList');
            if (records.length === 0) {
                list.innerHTML = '<div class="empty">📝 暂无批改记录</div>';
                return;
            }
            list.innerHTML = records.map(r => `
                <div class="record-item" onclick="showRecordDetail(${r.id})" style="flex-direction: column; align-items: flex-start;">
                    <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                        <div>
                            <span class="tag tag-${r.subject === '数学' ? 'math' : r.subject === '语文' ? 'chinese' : 'english'}">${r.subject}</span>
                            <span style="margin-left: 12px; font-weight: bold; color: #667eea;">${r.score}</span>
                            ${r.wrongQuestions && r.wrongQuestions.length > 0 ? 
                                `<span style="color: #e74c3c; margin-left: 8px;">❌ ${r.wrongQuestions.length}题</span>` : ''}
                        </div>
                        <span style="color: #999; font-size: 12px;">${r.date}</span>
                    </div>
                    ${r.image ? `<div style="margin-top: 8px; width: 100%;"><img src="${r.image}" style="max-height: 100px; max-width: 100%; border-radius: 4px; border: 1px solid #e9ecef;"></div>` : ''}
                </div>
            `).join('');
        }

        function showRecordDetail(recordId) {
            const records = JSON.parse(localStorage.getItem('records') || '[]');
            const record = records.find(r => r.id === recordId);
            if (!record) return;
            
            let content = `
                <div class="section">
                    <div class="section-title">📊 得分</div>
                    <div class="section-content" style="font-size: 24px; text-align: center; color: #667eea;">${record.score}</div>
                </div>
            `;
            
            // 显示作业图片
            if (record.image) {
                content += `
                    <div class="section">
                        <div class="section-title">📷 作业原图</div>
                        <div class="section-content" style="text-align: center;">
                            <img src="${record.image}" style="max-width: 100%; max-height: 400px; border-radius: 8px; cursor: pointer;" onclick="window.open('${record.image}')">
                        </div>
                    </div>
                `;
            }
            
            content += `
                <div class="section">
                    <div class="section-title">💬 总体评价</div>
                    <div class="section-content">${record.overallComment || '暂无'}</div>
                </div>
            `;
            
            if (record.wrongQuestions && record.wrongQuestions.length > 0) {
                content += `<div class="section"><div class="section-title">❌ 错题详情</div>`;
                record.wrongQuestions.forEach((wq, idx) => {
                    const wqNum = wq.number || (idx + 1);
                    const wqQ = wq.question || '题目内容';
                    const wqSA = wq.studentAnswer || '未作答';
                    const wqCA = wq.correctAnswer || '见解析';
                    const wqAna = wq.analysis || wq.errorType || '暂无解析';
                    content += `
                        <div class="section-content" style="margin-bottom: 12px;">
                            <div class="question-text">第${wqNum}题：${wqQ}</div>
                            <div class="error-answer">❌ 你的答案：${wqSA}</div>
                            <div class="correct-answer">✅ 正确答案：${wqCA}</div>
                            <div style="margin-top: 8px; color: #666;">📖 解析：${wqAna}</div>
                        </div>
                    `;
                });
                content += `</div>`;
            }
            
            if (record.studyAdvice) {
                content += `
                    <div class="section">
                        <div class="section-title">💡 学习建议</div>
                        <div class="section-content">${record.studyAdvice}</div>
                    </div>
                `;
            }
            
            showModal('批改详情', content);
        }

        function loadMistakes() {
            const mistakes = JSON.parse(localStorage.getItem('mistakes') || '[]');
            const list = document.getElementById('mistakesList');
            const statsDiv = document.getElementById('mistakeStats');
            
            // 统计
            const total = mistakes.length;
            const mathCount = mistakes.filter(m => m.subject === '数学').length;
            const chineseCount = mistakes.filter(m => m.subject === '语文').length;
            const englishCount = mistakes.filter(m => m.subject === '英语').length;
            
            statsDiv.innerHTML = `
                <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">总错题</div></div>
                <div class="stat-card"><div class="stat-number">${mathCount}</div><div class="stat-label">数学</div></div>
                <div class="stat-card"><div class="stat-number">${chineseCount}</div><div class="stat-label">语文</div></div>
                <div class="stat-card"><div class="stat-number">${englishCount}</div><div class="stat-label">英语</div></div>
            `;
            
            // 过滤
            let filtered = mistakes;
            if (currentMistakeFilter !== 'all') {
                filtered = mistakes.filter(m => m.subject === currentMistakeFilter);
            }
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty">✅ 暂无错题，继续加油！</div>';
                return;
            }
            
            // 按时间倒序
            filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            list.innerHTML = filtered.map(m => `
                <div class="mistake-item" onclick="showMistakeDetail(${m.id})">
                    <div class="mistake-header">
                        <div>
                            <span class="tag tag-${m.subject === '数学' ? 'math' : m.subject === '语文' ? 'chinese' : 'english'}">${m.subject}</span>
                            <span class="mistake-title" style="margin-left: 8px;">第${m.number || '?'}题</span>
                        </div>
                        <span class="mistake-meta">${m.date}</span>
                    </div>
                    <div class="mistake-content">
                        <div>${m.question || '题目内容'}</div>
                        <div style="margin-top: 8px;">
                            <span class="error-answer">你的答案：${m.studentAnswer || '未作答'}</span>
                            <span style="margin: 0 8px;">→</span>
                            <span class="correct-answer">正确答案</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterMistakes(subject) {
            currentMistakeFilter = subject;
            document.querySelectorAll('#mistakeFilters .filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            loadMistakes();
        }

        function showMistakeDetail(mistakeId) {
            const mistakes = JSON.parse(localStorage.getItem('mistakes') || '[]');
            const m = mistakes.find(item => item.id === mistakeId);
            if (!m) return;
            
            const content = `
                <div class="section">
                    <div class="section-title">📖 题目</div>
                    <div class="section-content">${m.question || '题目内容'}</div>
                </div>
                <div class="section">
                    <div class="section-title">❌ 你的答案</div>
                    <div class="section-content error-answer">${m.studentAnswer || '未作答'}</div>
                </div>
                <div class="section">
                    <div class="section-title">✅ 正确答案</div>
                    <div class="section-content correct-answer">${m.correctAnswer || '见解析'}</div>
                </div>
                <div class="section">
                    <div class="section-title">📊 错因分析</div>
                    <div class="section-content">
                        <div style="color: #e74c3c; margin-bottom: 8px;">错误类型：${m.errorType || '未分类'}</div>
                        <div>${m.analysis || '暂无解析'}</div>
                    </div>
                </div>
                <div class="section">
                    <div class="section-title">🕐 记录时间</div>
                    <div class="section-content">${m.date} ${m.time}</div>
                </div>
            `;
            showModal('错题详情', content);
        }

        function updateMistakeCount() {
            const mistakes = JSON.parse(localStorage.getItem('mistakes') || '[]');
            const badge = document.getElementById('mistakeCount');
            if (mistakes.length > 0) {
                badge.textContent = mistakes.length;
                badge.style.display = 'inline';
            } else {
                badge.style.display = 'none';
            }
        }

        function showModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal(event) {
            if (!event || event.target.id === 'modal' || event.target.className === 'modal-close') {
                document.getElementById('modal').classList.remove('active');
            }
        }
    </script>
</body>
</html>
