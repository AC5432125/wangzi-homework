<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王子作业助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 王子作业助手</h1>
            <p>初一 · AI智能批改</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="upload">📤 上传作业</button>
            <button class="tab-btn" data-tab="records">📋 批改记录</button>
            <button class="tab-btn" data-tab="mistakes">❌ 错题本</button>
            <button class="tab-btn" data-tab="weak">🎯 薄弱点</button>
            <button class="tab-btn" data-tab="practice">✏️ 练习生成</button>
        </nav>

        <!-- 上传作业 -->
        <section id="upload" class="tab-content active">
            <div class="upload-area" id="dropZone">
                <div class="upload-icon">📷</div>
                <p>点击或拖拽上传作业照片</p>
                <input type="file" id="fileInput" accept="image/*" capture="camera" multiple>
                <div class="subject-select">
                    <label>科目：</label>
                    <select id="subject">
                        <option value="math">数学</option>
                        <option value="chinese">语文</option>
                        <option value="english">英语</option>
                    </select>
                </div>
            </div>
            <div id="preview"></div>
            <button id="submitBtn" class="btn-primary">开始批改</button>
            <div id="gradingResult"></div>
        </section>

        <!-- 批改记录 -->
        <section id="records" class="tab-content">
            <h2>批改记录</h2>
            <div id="recordsList"></div>
        </section>

        <!-- 错题本 -->
        <section id="mistakes" class="tab-content">
            <h2>错题本</h2>
            <div class="filter-bar">
                <button class="filter-btn active" data-subject="all">全部</button>
                <button class="filter-btn" data-subject="math">数学</button>
                <button class="filter-btn" data-subject="chinese">语文</button>
                <button class="filter-btn" data-subject="english">英语</button>
            </div>
            <div id="mistakesList"></div>
        </section>

        <!-- 薄弱点 -->
        <section id="weak" class="tab-content">
            <h2>薄弱知识点</h2>
            <div id="weakPoints"></div>
        </section>

        <!-- 练习生成 -->
        <section id="practice" class="tab-content">
            <h2>智能练习</h2>
            <div class="practice-settings">
                <label>科目：</label>
                <select id="practiceSubject">
                    <option value="math">数学</option>
                    <option value="chinese">语文</option>
                    <option value="english">英语</option>
                </select>
                <label>难度：</label>
                <select id="difficulty">
                    <option value="easy">基础</option>
                    <option value="medium" selected>中等</option>
                    <option value="hard">挑战</option>
                </select>
                <label>题数：</label>
                <input type="number" id="questionCount" value="5" min="1" max="10">
                <button id="generateBtn" class="btn-primary">生成练习</button>
            </div>
            <div id="practiceContent"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
